<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>فقاعات</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg1: #0a0e1a;
    --bg2: #0f1628;
    --gold: #f0c040;
    --white: #e8f0ff;
    --muted: #4a5580;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #141d3a 0%, var(--bg1) 70%);
    touch-action: none;
    user-select: none;
  }

  /* stars */
  #stars {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden;
  }
  .star {
    position: absolute;
    background: #fff; border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle { 0%,100%{opacity:.15} 50%{opacity:.7} }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 10px;
    background: linear-gradient(to bottom, rgba(10,14,26,.9), transparent);
  }

  .hud-block { display: flex; flex-direction: column; align-items: center; }

  .hud-label {
    font-size: .65rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2px;
  }

  .hud-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem; color: var(--white);
    transition: transform .1s;
  }
  .hud-val.pop { transform: scale(1.3); color: var(--gold); }

  /* timer ring */
  #timer-wrap {
    position: relative; width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
  }
  #timer-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  #timer-track { fill: none; stroke: rgba(255,255,255,.08); stroke-width: 4; }
  #timer-arc   { fill: none; stroke: var(--gold); stroke-width: 4;
                 stroke-linecap: round;
                 stroke-dasharray: 151; stroke-dashoffset: 0;
                 transition: stroke .5s, stroke-dashoffset 1s linear; }
  #timer-num {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem; color: var(--white); position: relative; z-index: 1;
  }

  /* arena */
  #arena {
    position: fixed; inset: 0;
    overflow: hidden;
    cursor: crosshair;
  }

  /* bubble */
  .bubble {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transform: scale(0);
    animation: spawn .35s cubic-bezier(.34,1.56,.64,1) forwards;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    box-shadow: inset -6px -6px 14px rgba(0,0,0,.25),
                inset 4px 4px 10px rgba(255,255,255,.2),
                0 0 18px var(--gc);
  }
  @keyframes spawn { to { transform: scale(1); } }

  .bubble.burst {
    animation: burst .3s ease forwards;
    pointer-events: none;
  }
  @keyframes burst {
    0%  { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: .6; }
    100%{ transform: scale(0);  opacity: 0; }
  }

  /* special bomb */
  .bubble.bomb { animation: spawn .35s cubic-bezier(.34,1.56,.64,1) forwards,
                             pulse-bomb 1s ease-in-out infinite .35s; }
  @keyframes pulse-bomb {
    0%,100% { box-shadow: inset -6px -6px 14px rgba(0,0,0,.25),
                          inset 4px 4px 10px rgba(255,255,255,.2),
                          0 0 18px #ff4444; }
    50%      { box-shadow: inset -6px -6px 14px rgba(0,0,0,.25),
                          inset 4px 4px 10px rgba(255,255,255,.2),
                          0 0 40px #ff4444; }
  }

  /* particle */
  .particle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: fly var(--fly) ease-out forwards;
  }
  @keyframes fly {
    to { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* float text */
  .float-text {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    color: var(--gold);
    pointer-events: none;
    animation: floatUp .8s ease forwards;
    font-size: 1.2rem;
    text-shadow: 0 0 10px rgba(240,192,64,.6);
    z-index: 20;
  }
  @keyframes floatUp {
    to { transform: translateY(-60px); opacity: 0; }
  }

  /* miss ripple */
  .ripple {
    position: absolute; border-radius: 50%;
    pointer-events: none;
    animation: rippleOut .5s ease forwards;
  }
  @keyframes rippleOut {
    from { transform: scale(0); opacity: .5; }
    to   { transform: scale(2.5); opacity: 0; }
  }

  /* overlay */
  #overlay {
    position: fixed; inset: 0; z-index: 30;
    background: rgba(10,14,26,.85);
    backdrop-filter: blur(10px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    padding: 30px;
  }
  #overlay.hidden { display: none; }

  .ov-emoji { font-size: 4rem; animation: bounce 1s ease infinite; }
  @keyframes bounce {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)}
  }

  .ov-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem; color: var(--white); text-align: center;
  }

  .ov-sub {
    color: var(--muted); font-size: .9rem; text-align: center; line-height: 1.6;
  }

  .ov-score {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem; color: var(--gold);
    text-shadow: 0 0 30px rgba(240,192,64,.4);
  }

  .ov-best {
    font-size: .8rem; color: var(--muted); letter-spacing: 1px;
  }
  .ov-best b { color: var(--gold); }

  .play-btn {
    background: linear-gradient(135deg, #f0c040, #f08020);
    color: #0a0e1a;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    border: none; cursor: pointer;
    padding: 14px 44px;
    border-radius: 50px;
    box-shadow: 0 6px 30px rgba(240,160,32,.4);
    transition: transform .15s, box-shadow .15s;
    margin-top: 6px;
  }
  .play-btn:hover  { transform: scale(1.05); box-shadow: 0 8px 36px rgba(240,160,32,.6); }
  .play-btn:active { transform: scale(.96); }

  /* combo bar */
  #combo-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    color: var(--gold); z-index: 10; letter-spacing: 1px;
    text-shadow: 0 0 14px rgba(240,192,64,.5);
    opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  #combo-bar.show { opacity: 1; }
</style>
</head>
<body>

<div id="stars"></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-block">
    <div class="hud-label">النقاط</div>
    <div class="hud-val" id="scoreEl">0</div>
  </div>
  <div id="timer-wrap">
    <svg id="timer-svg" viewBox="0 0 56 56">
      <circle id="timer-track" cx="28" cy="28" r="24"/>
      <circle id="timer-arc"   cx="28" cy="28" r="24"/>
    </svg>
    <div id="timer-num">30</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">الأفضل</div>
    <div class="hud-val" id="bestEl">0</div>
  </div>
</div>

<!-- arena -->
<div id="arena"></div>

<!-- combo -->
<div id="combo-bar" id="comboBar">🔥 ×<span id="comboNum">0</span> مشاء الله!</div>

<!-- overlay -->
<div id="overlay">
  <div class="ov-emoji">🫧</div>
  <div class="ov-title">فقاعات!</div>
  <div class="ov-sub">انقر الفقاعات قبل أن تختفي<br/>💣 الفقاعة الحمراء تضيف 5 ثوانٍ</div>
  <div class="ov-score" id="finalScore" style="display:none">0</div>
  <div class="ov-best"  id="finalBest"  style="display:none"></div>
  <button class="play-btn" onclick="startGame()">العب الآن</button>
</div>

<script>
/* ── Audio Engine ── */
const AC = new (window.AudioContext || window.webkitAudioContext)();

function resumeAC() { if (AC.state === 'suspended') AC.resume(); }
document.addEventListener('pointerdown', resumeAC, { once: true });

function playPop(color) {
  // pitch varies by bubble color — each palette has a distinct note
  const freqs = [520, 440, 600, 480, 560, 400];
  const idx = PALETTES.findIndex(p => p.gc === color);
  const freq = idx >= 0 ? freqs[idx] : 500;

  const osc  = AC.createOscillator();
  const gain = AC.createGain();
  const now  = AC.currentTime;

  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 1.6, now + 0.04);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.18);

  gain.gain.setValueAtTime(0.28, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

  osc.connect(gain); gain.connect(AC.destination);
  osc.start(now); osc.stop(now + 0.23);
}

function playBomb() {
  // low boom + rising sweep
  const now = AC.currentTime;

  const osc1 = AC.createOscillator();
  const g1   = AC.createGain();
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(80, now);
  osc1.frequency.exponentialRampToValueAtTime(30, now + 0.3);
  g1.gain.setValueAtTime(0.4, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  osc1.connect(g1); g1.connect(AC.destination);
  osc1.start(now); osc1.stop(now + 0.36);

  const osc2 = AC.createOscillator();
  const g2   = AC.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(300, now + 0.05);
  osc2.frequency.exponentialRampToValueAtTime(900, now + 0.25);
  g2.gain.setValueAtTime(0.0, now);
  g2.gain.setValueAtTime(0.25, now + 0.05);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc2.connect(g2); g2.connect(AC.destination);
  osc2.start(now); osc2.stop(now + 0.31);
}

function playCombo() {
  // sparkle arpeggio
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => {
    const t   = AC.currentTime + i * 0.07;
    const osc = AC.createOscillator();
    const g   = AC.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f, t);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(g); g.connect(AC.destination);
    osc.start(t); osc.stop(t + 0.16);
  });
}

function playTick() {
  const now = AC.currentTime;
  const osc = AC.createOscillator();
  const g   = AC.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(220, now);
  g.gain.setValueAtTime(0.12, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
  osc.connect(g); g.connect(AC.destination);
  osc.start(now); osc.stop(now + 0.07);
}

function playGameOver() {
  const notes = [523, 415, 349, 262];
  notes.forEach((f, i) => {
    const t   = AC.currentTime + i * 0.18;
    const osc = AC.createOscillator();
    const g   = AC.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, t);
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(g); g.connect(AC.destination);
    osc.start(t); osc.stop(t + 0.26);
  });
}

/* ── stars ── */
const starsCont = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + .5;
  s.style.cssText = `
    width:${sz}px; height:${sz}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    --d:${(Math.random()*3+2).toFixed(1)}s;
    --delay:-${(Math.random()*4).toFixed(1)}s;
  `;
  starsCont.appendChild(s);
}

/* ── palette ── */
const PALETTES = [
  { bg: 'radial-gradient(circle at 35% 35%, #7ee8fa, #3a8bcd)', gc: '#3a8bcd' },
  { bg: 'radial-gradient(circle at 35% 35%, #ffd6e7, #e06090)', gc: '#e06090' },
  { bg: 'radial-gradient(circle at 35% 35%, #b8f5b0, #3db860)', gc: '#3db860' },
  { bg: 'radial-gradient(circle at 35% 35%, #ffe9a0, #e0a020)', gc: '#e0a020' },
  { bg: 'radial-gradient(circle at 35% 35%, #e0b0ff, #8040cc)', gc: '#8040cc' },
  { bg: 'radial-gradient(circle at 35% 35%, #ffc8a0, #e05020)', gc: '#e05020' },
];
const EMOJIS = ['⭐','✨','💎','🌸','🍀','🎯','⚡','🌙'];

/* ── state ── */
const arena = document.getElementById('arena');
const scoreEl = document.getElementById('scoreEl');
const bestEl  = document.getElementById('bestEl');
const timerNum= document.getElementById('timer-num');
const timerArc= document.getElementById('timer-arc');
const overlay = document.getElementById('overlay');
const finalScore = document.getElementById('finalScore');
const finalBest  = document.getElementById('finalBest');
const comboBar   = document.getElementById('combo-bar');
const comboNum   = document.getElementById('comboNum');

let score = 0, best = +localStorage.getItem('bub_best') || 0;
let timeLeft = 30, timerInterval, spawnInterval;
let running = false;
let combo = 0, comboTimer;
const CIRC = 2 * Math.PI * 24; // 150.796

bestEl.textContent = best;

function startGame() {
  overlay.classList.add('hidden');
  finalScore.style.display = 'none';
  finalBest.style.display  = 'none';
  score = 0; combo = 0; timeLeft = 30;
  scoreEl.textContent = '0';
  timerNum.textContent = '30';
  timerArc.style.stroke = '#f0c040';
  timerArc.style.strokeDashoffset = 0;
  clearAll();
  running = true;

  // spawn bubbles
  spawnInterval = setInterval(spawnBubble, 800);
  spawnBubble(); spawnBubble();

  // countdown
  timerInterval = setInterval(() => {
    timeLeft--;
    timerNum.textContent = timeLeft;
    // arc offset: full=0, empty=CIRC
    timerArc.style.strokeDashoffset = CIRC * (1 - timeLeft / 30);
    if (timeLeft <= 8) timerArc.style.stroke = '#ef5350';
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  running = false;
  clearInterval(timerInterval);
  clearInterval(spawnInterval);
  clearAll();
  if (score > best) { best = score; localStorage.setItem('bub_best', best); bestEl.textContent = best; }
  finalScore.textContent = score;
  finalScore.style.display = 'block';
  finalBest.innerHTML  = `أفضل نتيجة: <b>${best}</b>`;
  finalBest.style.display  = 'block';
  const ov = overlay.querySelector('.ov-title');
  ov.textContent = score >= 50 ? '🔥 رائع!' : score >= 20 ? '👏 جيد!' : '💪 حاول مجدداً';
  overlay.classList.remove('hidden');
  comboBar.classList.remove('show');
}

function clearAll() {
  arena.querySelectorAll('.bubble').forEach(b => b.remove());
}

/* ── spawn ── */
function spawnBubble() {
  if (!running) return;
  const isBomb = Math.random() < .08; // 8% chance
  const size = Math.random() * 40 + 44; // 44–84 px
  const pal = PALETTES[Math.floor(Math.random() * PALETTES.length)];
  const HUD_H = 80, margin = size / 2 + 8;
  const x = Math.random() * (window.innerWidth  - size) + size / 2;
  const y = Math.random() * (window.innerHeight - HUD_H - size) + HUD_H + size / 2;

  const b = document.createElement('div');
  b.className = 'bubble' + (isBomb ? ' bomb' : '');
  b.style.cssText = `
    width:${size}px; height:${size}px;
    left:${x - size/2}px; top:${y - size/2}px;
    background: ${isBomb ? 'radial-gradient(circle at 35% 35%, #ff8080, #cc0000)' : pal.bg};
    --gc: ${isBomb ? '#ff4444' : pal.gc};
  `;
  if (!isBomb) b.textContent = Math.random() < .3 ? EMOJIS[Math.floor(Math.random()*EMOJIS.length)] : '';

  // auto-pop (miss)
  const lifespan = isBomb ? 3000 : Math.random() * 1500 + 1200;
  const autoRemove = setTimeout(() => {
    if (!b.isConnected) return;
    missRipple(x, y, size);
    if (!b.classList.contains('burst')) b.remove();
    breakCombo();
  }, lifespan);

  b.addEventListener('pointerdown', e => {
    e.stopPropagation();
    if (!running) return;
    clearTimeout(autoRemove);
    burst(b, x, y, size, pal.gc, isBomb);
  });

  arena.appendChild(b);
}

/* ── burst ── */
function burst(b, x, y, size, color, isBomb) {
  b.classList.add('burst');
  b.addEventListener('animationend', () => b.remove(), { once: true });

  if (isBomb) {
    // +5 seconds bonus
    timeLeft = Math.min(timeLeft + 5, 30);
    timerNum.textContent = timeLeft;
    timerArc.style.strokeDashoffset = CIRC * (1 - timeLeft / 30);
    if (timeLeft > 8) timerArc.style.stroke = '#f0c040';
    spawnFloat(x, y, '+5s ⏱️', '#ef9a9a');
    emitParticles(x, y, 14, '#ff6060');
    return;
  }

  combo++;
  const pts = combo >= 5 ? 3 : 1;
  score += pts;
  scoreEl.textContent = score;
  popAnim(scoreEl);

  spawnFloat(x, y, combo >= 5 ? `+${pts} 🔥` : `+${pts}`, combo >= 5 ? '#f0c040' : '#e8f0ff');
  emitParticles(x, y, 8, color);

  // combo display
  if (combo >= 3) {
    comboNum.textContent = combo;
    comboBar.classList.add('show');
  }
  clearTimeout(comboTimer);
  comboTimer = setTimeout(breakCombo, 1200);
}

function breakCombo() {
  combo = 0;
  comboBar.classList.remove('show');
}

/* ── helpers ── */
function spawnFloat(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.cssText = `left:${x}px; top:${y}px; color:${color}; transform:translateX(-50%);`;
  arena.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function emitParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / n) * Math.PI * 2;
    const dist  = Math.random() * 60 + 30;
    p.style.cssText = `
      left:${x}px; top:${y}px;
      background:${color};
      --tx:${(Math.cos(angle)*dist).toFixed(1)}px;
      --ty:${(Math.sin(angle)*dist).toFixed(1)}px;
      --fly:${(Math.random()*.4+.3).toFixed(2)}s;
    `;
    arena.appendChild(p);
    p.addEventListener('animationend', () => p.remove(), { once: true });
  }
}

function missRipple(x, y, size) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = `
    left:${x - size/2}px; top:${y - size/2}px;
    width:${size}px; height:${size}px;
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.2);
  `;
  arena.appendChild(r);
  r.addEventListener('animationend', () => r.remove(), { once: true });
}

function popAnim(el) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 200);
}

/* miss tap on arena */
arena.addEventListener('pointerdown', e => {
  if (e.target !== arena || !running) return;
  const r = document.createElement('div');
  r.className = 'ripple';
  const sz = 40;
  r.style.cssText = `left:${e.clientX-sz/2}px; top:${e.clientY-sz/2}px;
    width:${sz}px; height:${sz}px;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15);`;
  arena.appendChild(r);
  r.addEventListener('animationend', () => r.remove(), { once: true });
});
</script>
</body>
</html>
